<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4 rounded-4" style="width: 380px;">

        <div class="text-center mb-4">
            <h3 class="fw-bold">🔐 SignUp</h3>
            <p class="text-muted small">Welcome! Please sign up to get started.</p>
        </div>

        <form (ngSubmit)="doSignup()" #signupForm="ngForm">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" [(ngModel)]="signupData.username" required class="form-control"
                    placeholder="Enter username" />
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" [(ngModel)]="signupData.password" required class="form-control"
                    placeholder="Enter password" />
            </div>

            
            <div class="mb-3">
                <label class="form-label">Customer Name</label>
                <input type="text" name="customerName" [(ngModel)]="signupData.custName" required class="form-control"
                    placeholder="Enter customer name" />
            </div>

            
            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone" [(ngModel)]="signupData.phoneNo" required class="form-control"
                    placeholder="Enter phone number" />
            </div>

            <button type="submit" [disabled]="signupForm.invalid" class="btn btn-primary w-100 mt-2">
                Sign Up
            </button>

        </form>

        <div *ngIf="errorMessage" class="alert alert-danger mt-3 text-center">
            {{ errorMessage }}
        </div>

    </div>

</div>
