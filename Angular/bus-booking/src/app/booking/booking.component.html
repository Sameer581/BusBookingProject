<div class="booking-wrapper container mt-4 text-center">

  <h3 class="mb-3">🚌 Select Your Seats</h3>

  <!-- Actions -->
  <div class="mb-4">
    <button class="btn btn-warning me-2 action-btn" (click)="resetBooking()">
      🔄 Reset
    </button>
    <button class="btn btn-danger action-btn" (click)="clearSeats()">
      ❌ Clear
    </button>
  </div>

  <!-- Seat Layout Card -->
  <div class="seat-card p-4 mb-4">

    <div class="driver">🚍 Driver</div>

    <div class="seat-grid"
      [style.gridTemplateColumns]="'repeat(' + cols + ', 60px)'">

      <ng-container *ngFor="let row of seats">
        <ng-container *ngFor="let seat of row; let colIndex = index">

          <div class="seat"
            [ngClass]="{
              'selected': seat.isSelected,
              'booked': seat.isBooked,
              'aisle': colIndex === 1
            }"
            (click)="toggleSeat(seat)">
            {{ seat.seatNumber }}
          </div>

        </ng-container>
      </ng-container>

    </div>

    <!-- Legend -->
    <div class="legend mt-3">
      <span class="box available"></span> Available
      <span class="box selected ms-3"></span> Selected
      <span class="box booked ms-3"></span> Booked
    </div>

  </div>

  <!-- Passenger Details -->
  <div *ngFor="let p of passengers" class="passenger-card p-3 mb-3">

    <strong>Seat {{ p.seatNo }}</strong>

    <input type="text"
      placeholder="Passenger Name"
      [(ngModel)]="p.passengerName"
      class="form-control my-2 custom-input" />

    <input type="number"
      placeholder="Age"
      [(ngModel)]="p.passengerAge"
      class="form-control custom-input" />

  </div>

  <!-- Book Button -->
  <div class="mt-3">
    <button class="btn book-btn px-4 py-2" (click)="bookSeats()">
      ✅ Confirm Booking
    </button>
  </div>

</div>
