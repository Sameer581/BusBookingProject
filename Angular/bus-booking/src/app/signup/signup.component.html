<div class="signup-wrapper d-flex justify-content-center align-items-center vh-100">

  <div class="signup-card p-4">

    <div class="text-center mb-4">
      <h2 class="fw-bold mb-1">🚀 Create Account</h2>
      <p class="small text-light">Join us and start your journey</p>
    </div>

    <form (ngSubmit)="doSignup()" #signupForm="ngForm">

    <!-- Username -->
    <div class="mb-3">
      <label>Username</label>
      <input type="text" name="username"
        [(ngModel)]="signupData.username"
        #username="ngModel"
        required minlength="4"
        class="form-control custom-input"
        placeholder="Enter username" />

      <small class="text-danger" *ngIf="username.touched && username.invalid">
        Username must be at least 4 characters
      </small>
    </div>

    <!-- Password -->
    <div class="mb-3">
      <label>Password</label>
      <input type="password" name="password"
        [(ngModel)]="signupData.password"
        #password="ngModel"
        required minlength="6" pattern=".*[0-9].*"
        class="form-control custom-input"
        placeholder="Enter password" />

      <small class="text-danger" *ngIf="password.touched && password.invalid">
        Password must be 6+ chars and include a number
      </small>
    </div>

    <!-- Customer Name -->
    <div class="mb-3">
      <label>Customer Name</label>
      <input type="text" name="customerName"
        [(ngModel)]="signupData.custName"
        #custName="ngModel"
        required pattern="^[a-zA-Z ]+$"
        class="form-control custom-input"
        placeholder="Enter full name" />

      <small class="text-danger" *ngIf="custName.touched && custName.invalid">
        Only letters allowed
      </small>
    </div>

    <!-- Phone -->
    <div class="mb-3">
      <label>Phone Number</label>
      <input type="text" name="phone"
        [(ngModel)]="signupData.phoneNo"
        #phone="ngModel"
        required pattern="^[0-9]{10}$"
        class="form-control custom-input"
        placeholder="Enter 10-digit number" />

      <small class="text-danger" *ngIf="phone.touched && phone.invalid">
        Enter a valid 10-digit phone number
      </small>
    </div>

    <!-- Button -->
    <button type="submit"
      [disabled]="signupForm.invalid"
      class="btn signup-btn w-100 mt-3">
      Sign Up →
    </button>

  </form>

    <!-- Login redirect -->
    <div class="text-center mt-3">
      <p class="small mb-0 text-light">
        Already have an account?
        <a routerLink="/login" class="login-link">Login</a>
      </p>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger mt-3 text-center">
      {{ errorMessage }}
    </div>

  </div>

</div>
