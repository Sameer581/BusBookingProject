<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4 rounded-4" style="width: 380px;">

        <div class="text-center mb-4">
            <h3 class="fw-bold">🔐 Login</h3>
            <p class="text-muted small">Welcome back! Please login</p>
        </div>

        <form (ngSubmit)="doLogin()" #loginForm="ngForm">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" [(ngModel)]="loginData.username" required class="form-control"
                    placeholder="Enter username" />
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" [(ngModel)]="loginData.password" required class="form-control"
                    placeholder="Enter password" />
            </div>

            <button type="submit" [disabled]="loginForm.invalid" class="btn btn-primary w-100 mt-2">
                Login
            </button>

        </form>

        <div *ngIf="errorMessage" class="alert alert-danger mt-3 text-center">
            {{ errorMessage }}
        </div>

    </div>

</div>
