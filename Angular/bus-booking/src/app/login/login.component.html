<div class="login-wrapper d-flex justify-content-center align-items-center vh-100">

  <div class="login-card p-4">

    <div class="text-center mb-4">
      <h2 class="fw-bold mb-1">🔐 Welcome Back</h2>
      <p class="text-muted small">Login to continue your journey</p>
    </div>

    <form (ngSubmit)="doLogin()" #loginForm="ngForm">

      <div class="form-group mb-3">
        <label>Username</label>
        <input 
          type="text" 
          name="username" 
          [(ngModel)]="loginData.username" 
          required 
          class="form-control custom-input"
          placeholder="Enter username" />
      </div>

      <div class="form-group mb-3">
        <label>Password</label>
        <input 
          type="password" 
          name="password" 
          [(ngModel)]="loginData.password" 
          required 
          class="form-control custom-input"
          placeholder="Enter password" />
      </div>
      <div class="text-center mt-3">
        <p class="small mb-0">
          Don't have an account?
          <a routerLink="/signup" class="signup-link">Sign up</a>
        </p>
      </div>

      <button 
        type="submit" 
        [disabled]="loginForm.invalid" 
        class="btn login-btn w-100 mt-3">
        Login →
      </button>

    </form>

    <div *ngIf="errorMessage" class="alert alert-danger mt-3 text-center">
      {{ errorMessage }}
    </div>

  </div>

</div>
